name: 'setup-env'
on:
  pull_request:
    paths:
    - 'setup-env/**'
    - '.github/workflows/setup-env*'
  push:
    paths:
    - 'setup-env/**'
    - '.github/workflows/setup-env*'


# Security (APS-19077): least-privilege token scope. These workflows only
# run unit tests; they do not push, comment, or release. Read access to repo
# contents is sufficient.
permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ${{ matrix.operating-system }}
    strategy:
      matrix:
        operating-system: [ubuntu-latest, macos-latest, windows-latest]
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Set Node.js 24.x
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      with:
        node-version: 24.x
        cache: 'npm'
        cache-dependency-path: 'setup-env/package-lock.json'

    - name: npm install
      working-directory: ./setup-env
      run: npm install

    - name: Lint and Unit tests
      working-directory: ./setup-env
      run: npm run test
